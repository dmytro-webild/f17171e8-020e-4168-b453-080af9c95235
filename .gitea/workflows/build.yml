name: Code Check

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        run: |
          HOST="${{ gitea.server_url }}"; HOST="${HOST#https://}"; HOST="${HOST#http://}"
          TOKEN="${{ github.token }}"
          [ -z "$TOKEN" ] && TOKEN="${{ secrets.GITHUB_TOKEN }}"
          if [ -z "$TOKEN" ]; then echo "::error::CI checkout has no auth token (github.token and secrets.GITHUB_TOKEN both empty)"; exit 1; fi
          git clone --depth 1 --branch "${{ gitea.ref_name }}" "https://token:${TOKEN}@${HOST}/${{ gitea.repository }}.git" . || exit 1

      - name: Install dependencies
        run: |
          if [ -f "vite.config.ts" ]; then
            if [ -d "/var/node_modules_cache_v4/node_modules" ]; then
              ln -s /var/node_modules_cache_v4/node_modules ./node_modules
            elif [ -f "pnpm-lock.yaml" ]; then
              npm install -g pnpm --silent
              pnpm install --frozen-lockfile
            else
              npm ci --prefer-offline --no-audit
            fi
          elif [ -d "/var/node_modules_cache/node_modules" ]; then
            ln -s /var/node_modules_cache/node_modules ./node_modules
          else
            npm ci --prefer-offline --no-audit
          fi
        timeout-minutes: 5

      - name: TypeScript check
        run: npm run typecheck 2>&1 | tee build.log
        timeout-minutes: 3

      - name: ESLint check
        run: npm run lint 2>&1 | tee -a build.log
        timeout-minutes: 3
